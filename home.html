<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexum | News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,900;1,900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .nav-blur { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-yellow { background-color: #facc15; color: black; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .btn-yellow:hover { transform: scale(1.05); background-color: #fde047; }
        .logo { font-weight: 900; font-style: italic; font-size: 1.5rem; text-transform: uppercase; }
        .news-header { background: linear-gradient(to bottom, #111, #050505); padding: 150px 20px 60px; text-center; }
        .article-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; transition: 0.3s; overflow: hidden; display: flex; margin-bottom: 24px; }
        .article-card:hover { border-color: #facc15; transform: translateX(5px); }
        .article-img { width: 300px; height: 200px; bg-size: cover; bg-position: center; }
    </style>
</head>
<body>
    <nav class="nav-blur fixed w-full z-50 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-10">
            <div class="logo">Nexum</div>
            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-[2px] text-gray-400">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="home.html" class="text-white">News</a>
                <a href="#" class="hover:text-white transition">Donations</a>
            </div>
        </div>
        <a href="#" class="btn-yellow px-6 py-2 rounded-full text-[11px]">Download</a>
    </nav>
    <header class="news-header text-center">
        <h1 class="text-6xl font-black uppercase italic tracking-tighter">News Archive</h1>
        <p class="text-gray-500 mt-4 uppercase tracking-[4px] text-xs font-bold italic">Project Nexum Updates</p>
    </header>
    <main class="max-w-5xl mx-auto py-12 px-6">
        <div class="article-card">
            <div class="article-img" style="background-image: url('https://erafn.dev/assets/img/news2.jpg');"></div>
            <div class="p-8 flex flex-col justify-center">
                <span class="text-yellow-500 text-[10px] font-black uppercase tracking-widest mb-2 italic">Update</span>
                <h2 class="text-2xl font-black uppercase italic mb-2">The Jungle Is Here</h2>
                <p class="text-gray-400 text-sm mb-4">Explore the new Season 1 map updates now.</p>
                <div class="text-gray-600 text-[10px] font-bold uppercase italic">March 2, 2026 • By Nexum Team</div>
            </div>
        </div>
    </main>
</body>
</html>
