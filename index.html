<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
    .box { width: 560px; height: 315px; position: relative; overflow: hidden; background: #000; }
    .box iframe { position: absolute; top: -60px; left: -10px; width: 580px; height: 440px; border: none; pointer-events: none; }
  </style>
</head>
<body>
  <div class="box">
    <div id="player"></div>
  </div>
  <script>
    const VIDEO_ID = 'CAKanjchZjA';
    const START = 535;
    const END = 548;

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    let player;

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 1,
          mute: 1,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          start: START
        },
        events: {
          onReady: function(e) {
            e.target.mute();
            e.target.seekTo(START, true);
            e.target.playVideo();
          },
          onStateChange: function(e) {
            if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
              e.target.seekTo(START, true);
              e.target.playVideo();
            }
          }
        }
      });
    };

    setInterval(function() {
      if (!player || !player.getCurrentTime) return;
      if (player.getCurrentTime() >= END) {
        player.seekTo(START, true);
        player.playVideo();
      }
    }, 300);
  </script>
</body>
</html>
