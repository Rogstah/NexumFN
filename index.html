<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh</title>
<link href="https://fonts.googleapis.com/css2?family=Burbank+Big+Condensed:wght@700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{background:#0a0a0f;font-family:'Rajdhani',sans-serif;}
nav{position:fixed;top:0;left:0;width:100%;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;border-bottom:1px solid rgba(255,255,255,0.05);}
.nav-logo{color:#fff;font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{color:#ccc;text-decoration:none;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.active{color:#fff;}
.hero{position:relative;width:100%;height:100vh;min-height:600px;display:flex;align-items:flex-end;padding-bottom:80px;}
.hero-bg{position:absolute;inset:0;background:url('banner.png') center center/cover no-repeat;z-index:0;}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.1) 60%,transparent 100%);}
.hero-content{position:relative;z-index:1;padding-left:clamp(32px,6vw,120px);padding-bottom:clamp(60px,8vw,120px);}
.hero-sub{display:block;color:#fff;font-size:clamp(13px,1.4vw,18px);font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.7);}
.hero-title{display:block;font-family:'Rajdhani',sans-serif;font-size:clamp(72px,11vw,160px);font-weight:700;color:#fff;line-height:0.88;text-transform:uppercase;letter-spacing:-1px;text-shadow:2px 4px 0px rgba(0,0,0,0.5),0 0 60px rgba(0,0,0,0.4);}
.hero-title span{display:block;}
.hero-btn{display:inline-block;margin-top:32px;background:#f5d800;color:#000;font-family:'Rajdhani',sans-serif;font-size:clamp(15px,1.6vw,20px);font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:18px 52px;text-decoration:none;transition:background 0.15s,transform 0.15s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
.hero-btn:hover{background:#ffe800;transform:scale(1.04);}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">Fresh</div>
  <ul class="nav-links">
    <li><a href="#" class="active">Home</a></li>
    <li><a href="#">News</a></li>
    <li><a href="#">Donations</a></li>
    <li><a href="#">Tournaments</a></li>
  </ul>
</nav>
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <span class="hero-sub">Project Fresh</span>
    <span class="hero-title"><span>SEASON 8</span></span>
    <a href="#" class="hero-btn">DOWNLOAD</a>
  </div>
</section>
</body>
</html>
