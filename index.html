<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUM</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #fff; font-family: 'Barlow Condensed', 'Arial Black', sans-serif; overflow-x: hidden; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: #0b0f16; display: flex; align-items: center;
  justify-content: space-between; padding: 0 28px; height: 46px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.logo { font-size: 20px; font-weight: 900; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
.nav-links { display: flex; gap: 36px; list-style: none; }
.nav-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: #fff; }

.hero { position: relative; margin-top: 46px; width: 100%; height: 490px; overflow: hidden; }
.hero img.hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 20%; display: block; }
.hero-fade-left { position: absolute; inset: 0; background: linear-gradient(to right, rgba(5,4,3,0.92) 0%, rgba(5,4,3,0.65) 25%, rgba(5,4,3,0.2) 50%, transparent 70%); z-index: 1; }
.hero-fade-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 200px; background: linear-gradient(to top, #0d1117 0%, transparent 100%); z-index: 1; }
.hero-content { position: absolute; left: 58px; top: 50%; transform: translateY(-52%); z-index: 2; }

.hero-eyebrow {
  font-size: 16px; font-weight: 800; letter-spacing: 5px; color: #fff; text-transform: uppercase;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  opacity: 0; transform: translateY(26px);
  animation: up 0.6s cubic-bezier(.22,1,.36,1) forwards 0.1s;
}
.hero-title {
  font-size: 100px; font-weight: 900; line-height: 0.85; color: #fff;
  text-transform: uppercase; font-style: italic; letter-spacing: -1px;
  text-shadow: 4px 4px 0 rgba(0,0,0,0.6);
  opacity: 0; transform: translateY(34px);
  animation: up 0.75s cubic-bezier(.22,1,.36,1) forwards 0.38s;
}
.hero-btn {
  display: inline-block; margin-top: 28px;
  background: #FFE000; color: #000;
  font-size: 15px; font-weight: 900; letter-spacing: 2px;
  padding: 14px 34px 14px 28px; text-decoration: none; text-transform: uppercase;
  clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%);
  opacity: 0; transform: translateY(18px);
  animation: up 0.55s cubic-bezier(.22,1,.36,1) forwards 0.78s;
  transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
}
.hero-btn:hover { background: #fff; transform: scale(1.055); box-shadow: 0 0 32px rgba(255,224,0,0.55); }
@keyframes up { to { opacity: 1; transform: translateY(0); } }

.hero-spike { position: absolute; bottom: -1px; left: 0; right: 0; height: 84px; z-index: 3; pointer-events: none; }
.hero-spike svg { display: block; width: 100%; height: 100%; }

.section { padding: 64px 48px; }
.section-title { text-align: center; font-size: 30px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: #fff; margin-bottom: 38px; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; max-width: 1240px; margin: 0 auto; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; max-width: 1240px; margin: 6px auto 0; }

.card { position: relative; overflow: hidden; cursor: pointer; display: block; background: #111; }
.card img { display: block; width: 100%; height: 100%; object-fit: cover; transition: transform 0.38s cubic-bezier(.22,1,.36,1); }
.card:hover img { transform: scale(1.06); }
.card-shade { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 55%); transition: opacity 0.3s; }
.card:hover .card-shade { opacity: 0.8; }
.badge { position: absolute; top: 12px; left: 12px; z-index: 2; background: #e8195a; color: #fff; font-size: 11px; font-weight: 900; letter-spacing: 1.5px; padding: 3px 9px; text-transform: uppercase; }

.video-section { text-align: center; padding: 56px 48px 80px; }
.video-wrap { max-width: 660px; margin: 0 auto; border: 1px solid #1e2530; }
.video-wrap iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }

footer { padding: 28px 48px; text-align: center; color: rgba(255,255,255,0.25); font-size: 12px; letter-spacing: 1px; border-top: 1px solid #151c26; }
</style>
</head>
<body>

<nav>
  <div class="logo">NEXUM</div>
  <ul class="nav-links">
    <li><a href="#" class="active">Home</a></li>

  <div class="hero-spike">

    </div>
    <div class="card" style="height:200px;">
      <img src="https://cdn2.unrealengine.com/Fortnite/fortnite-game/blog/fortnite-season-8-patch-notes/S8_PatchNotes-1920x1080-a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2.jpg" alt="News 4" onerror="this.style.background='linear-gradient(150deg,#1e0000,#520000,#960000,#cc1800)'">
      <div class="card-shade"></div>
    </div>
    <div class="card" style="height:200px;">
      <img src="https://cdn2.unrealengine.com/Fortnite/fortnite-game/blog/fortnite-season-8-content-update-1/S8_ContentUpdate1-1920x1080-a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2.jpg" alt="News 5" onerror="this.style.background='linear-gradient(150deg,#180000,#440000,#800000,#b01200)'">
      <div class="card-shade"></div>
    </div>
  </div>
</div>

  <div class="grid2">
    <div class="card" style="height:234px;">
